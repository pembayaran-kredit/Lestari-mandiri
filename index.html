<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperasi Abadi Lestari Mandiri</title>
    <!-- Load Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- FIREBASE CONFIG ---
        // Catatan: Jika di GitHub, ganti __firebase_config dengan object config dari Firebase Console Anda
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "MASUKKAN_API_KEY_ANDA",
                authDomain: "PROJECT_ID.firebaseapp.com",
                projectId: "PROJECT_ID",
                storageBucket: "PROJECT_ID.appspot.com",
                messagingSenderId: "SENDER_ID",
                appId: "APP_ID"
            };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'koperasi-digital-default';

        // Icons Helper
        const Icon = ({ name, size = 16, className = "" }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [filterMacet, setFilterMacet] = useState(false);
            const [transactions, setTransactions] = useState([]);
            const [members, setMembers] = useState([]);

            const [showMemberModal, setShowMemberModal] = useState(false);
            const [showTransModal, setShowTransModal] = useState(false);
            
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [facingMode, setFacingMode] = useState('user'); 
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            const [newMember, setNewMember] = useState({ name: '', phone: '', nik: '', photo: null });
            const [newTrans, setNewTrans] = useState({ 
                memberId: '', type: 'simpanan', amount: '', interestRate: '10', note: '',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (!u) auth.signInAnonymously();
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/public/data`;
                
                const unsubMembers = db.collection(`${path}/members`).onSnapshot(snap => {
                    setMembers(snap.docs.map(d => ({ ...d.data(), id: d.id })));
                    setLoading(false);
                });

                const unsubTrans = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    const data = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                    setTransactions(data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                });

                return () => { unsubMembers(); unsubTrans(); };
            }, [user]);

            const stats = useMemo(() => {
                const memberMap = {};
                members.forEach(m => {
                    memberMap[m.id] = { 
                        ...m, sisaPiutangPlusBunga: 0, totalSimpanan: 0, transaksiTerakhir: null,
                        pernahPinjam: false, status: 'calon', hariSejakTransaksi: 0,
                        totalPinjamanPokokMember: 0, totalAngsuranMember: 0
                    };
                });

                let totalMasuk = 0, totalKeluarReal = 0, pinjamanBulanIni = 0, angsuranBulanIni = 0;
                let totalPiutangGlobal = 0, totalPinjamanPokok = 0, totalSaldoMacet = 0;
                const now = new Date(), currentMonth = now.getMonth(), currentYear = now.getFullYear();

                [...transactions].reverse().forEach(t => {
                    const amt = parseFloat(t.amount) || 0;
                    const m = memberMap[t.memberId];
                    const tDate = new Date(t.date);
                    const isCurrentMonth = tDate.getMonth() === currentMonth && tDate.getFullYear() === currentYear;

                    if (['simpanan', 'angsuran', 'admin', 'suntikan_kas'].includes(t.type)) totalMasuk += amt;
                    else if (['pinjaman_cair', 'pengeluaran'].includes(t.type)) totalKeluarReal += amt;

                    if (isCurrentMonth) {
                        if (t.type === 'pinjaman_cair') pinjamanBulanIni += amt;
                        if (t.type === 'angsuran' || t.type === 'potong_tabungan') angsuranBulanIni += amt;
                    }

                    if (m) {
                        if (!m.transaksiTerakhir || tDate > m.transaksiTerakhir) m.transaksiTerakhir = tDate;
                        if (t.type === 'pinjaman_pokok') {
                            totalPinjamanPokok += amt; m.totalPinjamanPokokMember += amt;
                            m.sisaPiutangPlusBunga += (amt + (amt * (parseFloat(t.interestRate || 10) / 100)));
                            m.pernahPinjam = true;
                        }
                        if (t.type === 'angsuran' || t.type === 'potong_tabungan') m.sisaPiutangPlusBunga -= amt;
                        if (t.type === 'simpanan') m.totalSimpanan += amt;
                        if (t.type === 'potong_tabungan') m.totalSimpanan -= amt;
                    }
                });

                let lunas = 0, berjalan = 0, macet = 0;
                Object.values(memberMap).forEach(m => {
                    if (m.sisaPiutangPlusBunga > 0) totalPiutangGlobal += m.sisaPiutangPlusBunga;
                    if (!m.pernahPinjam) m.status = 'calon';
                    else if (m.sisaPiutangPlusBunga <= 100) { m.status = 'lunas'; lunas++; }
                    else {
                        const diffDays = Math.ceil(Math.abs(now - (m.transaksiTerakhir || 0)) / (1000 * 60 * 60 * 24));
                        m.hariSejakTransaksi = diffDays;
                        if (diffDays > 30) { m.status = 'macet'; macet++; totalSaldoMacet += m.sisaPiutangPlusBunga; }
                        else { m.status = 'berjalan'; berjalan++; }
                    }
                });

                return { memberList: Object.values(memberMap), kasBersih: totalMasuk - totalKeluarReal, pinjamanBulanIni, angsuranBulanIni, totalPiutangGlobal, totalPinjamanPokok, totalSaldoMacet, summary: { total: members.length, lunas, berjalan, macet } };
            }, [members, transactions]);

            const submitTransaction = async (e) => {
                e.preventDefault();
                const amt = parseFloat(newTrans.amount);
                const member = members.find(m => m.id === newTrans.memberId);
                const path = `artifacts/${appId}/public/data/transactions`;

                try {
                    if (newTrans.type === 'pinjaman') {
                        const admin = amt * 0.05, savings = amt * 0.05, net = amt - admin - savings;
                        const base = { ...newTrans, memberName: member.name, timestamp: Date.now() };
                        await db.collection(path).add({ ...base, type: 'pinjaman_pokok', amount: amt });
                        await db.collection(path).add({ ...base, type: 'pinjaman_cair', amount: net, timestamp: Date.now() + 1 });
                        await db.collection(path).add({ ...base, type: 'admin', amount: admin, timestamp: Date.now() + 2 });
                        await db.collection(path).add({ ...base, type: 'simpanan', amount: savings, timestamp: Date.now() + 3 });
                    } else {
                        await db.collection(path).add({ ...newTrans, amount: amt, memberName: member?.name || 'KAS UMUM', timestamp: Date.now() });
                    }
                    setShowTransModal(false);
                    setNewTrans({ ...newTrans, amount: '', note: '' });
                } catch (err) { alert(err.message); }
            };

            const startCamera = async (mode) => {
                setIsCameraActive(true); setFacingMode(mode);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                videoRef.current.srcObject = stream;
            };

            const takePhoto = () => {
                const canvas = canvasRef.current;
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setNewMember({ ...newMember, photo: canvas.toDataURL('image/jpeg') });
                videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                setIsCameraActive(false);
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center">Memuat...</div>;

            return (
                <div className="min-h-screen bg-[#F8FAFC] pb-32">
                    <header className="bg-slate-900 text-white pt-12 pb-24 px-6 rounded-b-[3rem] shadow-xl">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black italic">KOPERASI MANDIRI</h1>
                            <div className="text-right">
                                <p className="text-[10px] text-slate-400 font-bold uppercase">Kas Bersih</p>
                                <p className="text-lg font-black text-emerald-400">Rp {stats.kasBersih.toLocaleString()}</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-5 -mt-12 space-y-4">
                        {activeTab === 'dashboard' ? (
                            <>
                                <div className="grid grid-cols-4 gap-2">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm text-center border border-slate-100">
                                        <p className="text-lg font-black">{stats.summary.total}</p>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase">Total</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-2xl shadow-sm text-center border border-slate-100">
                                        <p className="text-lg font-black text-emerald-500">{stats.summary.lunas}</p>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase">Lunas</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-2xl shadow-sm text-center border border-slate-100">
                                        <p className="text-lg font-black text-blue-500">{stats.summary.berjalan}</p>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase">Jalan</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-2xl shadow-sm text-center border border-slate-100">
                                        <p className="text-lg font-black text-rose-500">{stats.summary.macet}</p>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase">Macet</p>
                                    </div>
                                </div>

                                <div className="bg-indigo-600 p-6 rounded-[2rem] text-white shadow-lg">
                                    <p className="text-[10px] font-bold opacity-70 uppercase tracking-widest">Total Piutang Global</p>
                                    <p className="text-2xl font-black">Rp {stats.totalPiutangGlobal.toLocaleString()}</p>
                                </div>

                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b flex justify-between items-center">
                                        <h2 className="text-xs font-black uppercase tracking-widest">Daftar Nasabah</h2>
                                        <button onClick={() => setShowMemberModal(true)} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-bold">TAMBAH</button>
                                    </div>
                                    <div className="divide-y divide-slate-50 max-h-80 overflow-y-auto">
                                        {stats.memberList.map(m => (
                                            <div key={m.id} className="p-4 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center font-bold text-slate-400">
                                                        {m.photo ? <img src={m.photo} className="w-full h-full object-cover"/> : m.name[0]}
                                                    </div>
                                                    <div>
                                                        <p className="text-[11px] font-black uppercase">{m.name}</p>
                                                        <p className="text-[9px] text-rose-500 font-bold">Rp {m.sisaPiutangPlusBunga.toLocaleString()}</p>
                                                    </div>
                                                </div>
                                                <div className={`text-[8px] font-black px-2 py-1 rounded-full uppercase ${m.status === 'macet' ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-500'}`}>{m.status}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                                <h2 className="text-xs font-black uppercase mb-4">Riwayat Transaksi</h2>
                                <div className="space-y-3">
                                    {transactions.map(t => (
                                        <div key={t.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                            <div>
                                                <p className="text-[10px] font-black uppercase">{t.memberName}</p>
                                                <p className="text-[8px] text-slate-400">{t.type} • {t.date}</p>
                                                {t.note && <p className="text-[8px] text-indigo-500 italic">"{t.note}"</p>}
                                            </div>
                                            <p className={`text-xs font-black ${['simpanan','angsuran'].includes(t.type) ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                Rp {parseFloat(t.amount).toLocaleString()}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Nav */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900 text-white p-2 rounded-full shadow-2xl flex justify-around items-center">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-full ${activeTab === 'dashboard' ? 'bg-white text-slate-900' : ''}`}><Icon name="LayoutDashboard" size={20}/></button>
                        <button onClick={() => setShowTransModal(true)} className="bg-indigo-500 p-4 rounded-full -translate-y-4 shadow-lg"><Icon name="Plus" size={24}/></button>
                        <button onClick={() => setActiveTab('history')} className={`p-3 rounded-full ${activeTab === 'history' ? 'bg-white text-slate-900' : ''}`}><Icon name="History" size={20}/></button>
                    </nav>

                    {/* Modals (Simplified Logic) */}
                    {showTransModal && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-end p-4">
                            <div className="bg-white w-full rounded-[2rem] p-8 max-w-md mx-auto">
                                <div className="flex justify-between mb-6">
                                    <h3 className="font-black">INPUT DATA</h3>
                                    <button onClick={() => setShowTransModal(false)}><Icon name="X" /></button>
                                </div>
                                <form onSubmit={submitTransaction} className="space-y-4">
                                    <select required className="w-full bg-slate-100 p-4 rounded-2xl text-xs font-bold" onChange={e => setNewTrans({...newTrans, memberId: e.target.value})}>
                                        <option value="">Pilih Nasabah</option>
                                        <option value="umum">🏢 KAS UMUM</option>
                                        {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['simpanan','angsuran','pinjaman','pengeluaran'].map(type => (
                                            <button key={type} type="button" onClick={() => setNewTrans({...newTrans, type})} className={`p-2 rounded-xl text-[8px] font-black uppercase border ${newTrans.type === type ? 'bg-indigo-600 text-white' : ''}`}>{type}</button>
                                        ))}
                                    </div>
                                    <input type="number" placeholder="Nominal" required className="w-full bg-slate-100 p-4 rounded-2xl text-xs font-bold" value={newTrans.amount} onChange={e => setNewTrans({...newTrans, amount: e.target.value})} />
                                    
                                    {newTrans.type === 'pengeluaran' && (
                                        <textarea placeholder="Keterangan Pengeluaran" className="w-full bg-slate-100 p-4 rounded-2xl text-xs font-bold" value={newTrans.note} onChange={e => setNewTrans({...newTrans, note: e.target.value})} />
                                    )}
                                    
                                    <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs">SIMPAN</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Member Modal (Simplified) */}
                    {showMemberModal && (
                        <div className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-6 text-white">
                            <div className="w-full max-w-xs space-y-6">
                                <div className="w-40 h-40 bg-slate-800 rounded-3xl mx-auto overflow-hidden">
                                    {isCameraActive ? <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" /> : <img src={newMember.photo} className="w-full h-full object-cover" />}
                                </div>
                                <div className="flex gap-2">
                                    {!isCameraActive ? <button onClick={() => startCamera('user')} className="flex-1 bg-indigo-600 p-3 rounded-xl text-[10px] font-black">KAMERA</button> : <button onClick={takePhoto} className="flex-1 bg-emerald-600 p-3 rounded-xl text-[10px] font-black">AMBIL FOTO</button>}
                                </div>
                                <input placeholder="NAMA LENGKAP" className="w-full bg-white/10 p-4 rounded-2xl text-xs text-center font-bold" onChange={e => setNewMember({...newMember, name: e.target.value})} />
                                <input placeholder="NIK (16 DIGIT)" type="number" className="w-full bg-white/10 p-4 rounded-2xl text-xs text-center font-bold" onChange={e => setNewMember({...newMember, nik: e.target.value})} />
                                <button onClick={async () => {
                                    await db.collection(`artifacts/${appId}/public/data/members`).add({...newMember, timestamp: Date.now()});
                                    setShowMemberModal(false);
                                }} className="w-full bg-white text-slate-900 py-4 rounded-2xl font-black text-xs uppercase">Simpan Nasabah</button>
                                <button onClick={() => setShowMemberModal(false)} className="w-full text-slate-500 font-bold text-[10px]">BATAL</button>
                            </div>
                            <canvas ref={canvasRef} className="hidden" />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Load Firebase SDK (Legacy version for easier single-file HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</body>
</html>
